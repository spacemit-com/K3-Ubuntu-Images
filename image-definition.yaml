---
name: ubuntu-server-riscv64-preinstalled
display-name: Ubuntu Server RISC-V preinstalled
revision: 1
architecture: riscv64
series: resolute
class: preinstalled
kernel: linux-k3-6.18
gadget:
  type: "directory"
  url: "file://gadget.in"
rootfs:
  archive: ubuntu
  sources-list-deb822: true
  components:
    - main
    - restricted
    - universe
    - multiverse
  mirror: "http://ports.ubuntu.com/ubuntu-ports/"
  pocket: updates
  seed:
    urls:
      - "https://git.launchpad.net/~ubuntu-core-dev/ubuntu-seeds/+git/"
    branch: resolute
    names:
      - cloud-image
      - server
      - minimal
      - standard
customization:
  extra-ppas:
    - name: ubuntu-risc-v-team/k3
      fingerprint: BD1DB3F88CA5F7825AF79D5552663FF2DFDC39CA
  extra-packages:
    - name: "flash-kernel"
    - name: "grub-efi-riscv64"
    - name: "ubuntu-desktop"
  extra-snaps:
    - name: snapd
  fstab:
    - label: "writable"
      mountpoint: "/"
      filesystem-type: "ext4"
      dump: false
      fsck-order: 1
    - label: "esp"
      mountpoint: "/boot/efi"
      filesystem-type: "vfat"
      mount-options: "defaults"
      dump: false
      fsck-order: 1
  manual:
    copy-file:
      - destination: "/etc/default/grub.d/60-console.cfg"
        source: "grub.d/60-console.cfg"
      - destination: "/etc/default/grub.d/60-plymouth.cfg"
        source: "grub.d/60-plymouth.cfg"
artifacts:
  img:
    - name: ubuntu-26.04-preinstalled-server-riscv64.img
  manifest:
    name: ubuntu-26.04-preinstalled-server-riscv64.manifest
