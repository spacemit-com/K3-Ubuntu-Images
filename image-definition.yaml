---
name: ubuntu-desktop-riscv64-preinstalled
display-name: Ubuntu Server RISC-V preinstalled
revision: 1
architecture: riscv64
series: resolute
class: preinstalled
kernel: linux-image-spacemit-generic
gadget:
  type: "directory"
  url: "file://gadget.in"
rootfs:
  archive: ubuntu
  sources-list-deb822: true
  components:
    - main
    - restricted
    - universe
    - multiverse
  mirror: "http://mirrors.ustc.edu.cn/ubuntu-ports/"
  pocket: updates
  seed:
    urls:
      - "https://git.launchpad.net/~ubuntu-core-dev/ubuntu-seeds/+git/"
    branch: resolute
    names:
      - cloud-image
      - server
      - minimal
      - standard
customization:
  extra-ppas:
    - name: "spacemit/k3"
      fingerprint: "B4DD2D28C9C3837D30CD7EBAE6853B171243C347"
      keep-enabled: true
  extra-packages:
    - name: "flash-kernel"
    - name: "grub-efi-riscv64"
    - name: "ubuntu-desktop"
    - name: "img-gpu-powervr"
    - name: "chromium"
  extra-snaps:
    - name: snapd
  fstab:
    - label: "writable"
      mountpoint: "/"
      filesystem-type: "ext4"
      dump: false
      fsck-order: 1
    - label: "esp"
      mountpoint: "/boot/efi"
      filesystem-type: "vfat"
      mount-options: "defaults"
      dump: false
      fsck-order: 1
  manual:
    copy-file:
      - destination: "/etc/default/grub.d/60-console.cfg"
        source: "grub.d/60-console.cfg"
      - destination: "/etc/default/grub.d/60-plymouth.cfg"
        source: "grub.d/60-plymouth.cfg"
      - destination: "/etc/apt/preferences.d/spacemit"
        source: "spacemit-ppa-preference"
      - destination: "/usr/local/bin/setup-scripts.sh"
        source: "setup-scripts.sh"
      - destination: "/boot/grub/grub.cfg"
        source: "grub.cfg"
    execute:
      - path: "/usr/local/bin/setup-scripts.sh"

artifacts:
  img:
    - name: ubuntu-26.04-preinstalled-desktop-riscv64.img
  manifest:
    name: ubuntu-26.04-preinstalled-desktop-riscv64.manifest
